<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    
    <title>PMU Studio Pro - App Móvil</title>
    <meta name="description" content="PMU Studio Pro - Gestión Profesional de Micropigmentación">
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#E879F9">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow-x: hidden;
        }
        
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-header {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #E879F9;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .dashboard-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dashboard-card:active {
            transform: scale(0.95);
        }
        
        .card-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .card-subtitle {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .action-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:active {
            transform: scale(0.98);
        }
        
        .nav-bar {
            background: rgba(15, 15, 35, 0.95);
            padding: 12px 0 20px 0;
        }
        
        .nav-items {
            display: flex;
            justify-content: space-around;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-item.active {
            color: #E879F9;
            background: rgba(232, 121, 249, 0.1);
        }
        
        .nav-icon {
            font-size: 20px;
        }
        
        .nav-label {
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-title">PMU Studio Pro</div>
            <div>🔔</div>
        </header>
        
        <main class="main-content">
            <section class="welcome-section">
                <h1 class="welcome-title">¡Bienvenido!</h1>
                <p>Gestiona tu estudio PMU profesionalmente</p>
            </section>
            
            <section class="dashboard-grid">
                <div class="dashboard-card" onclick="showAlert('Clientes')">
                    <div class="card-icon">👥</div>
                    <div class="card-title">Clientes</div>
                    <div class="card-subtitle">0 registrados</div>
                </div>
                
                <div class="dashboard-card" onclick="showAlert('Citas')">
                    <div class="card-icon">📅</div>
                    <div class="card-title">Citas</div>
                    <div class="card-subtitle">0 hoy</div>
                </div>
                
                <div class="dashboard-card" onclick="showAlert('IA y Diseño')">
                    <div class="card-icon">🤖</div>
                    <div class="card-title">IA & Diseño</div>
                    <div class="card-subtitle">Análisis facial</div>
                </div>
                
                <div class="dashboard-card" onclick="showAlert('Finanzas')">
                    <div class="card-icon">💰</div>
                    <div class="card-title">Finanzas</div>
                    <div class="card-subtitle">$0</div>
                </div>
            </section>
            
            <section>
                <button class="action-btn" onclick="showAlert('Nuevo Cliente')">
                    ➕ Nuevo Cliente
                </button>
                <button class="action-btn" onclick="showAlert('Agendar Cita')">
                    📅 Agendar Cita
                </button>
                <button class="action-btn" onclick="showAlert('Análisis IA')">
                    🤖 Análisis IA
                </button>
            </section>
        </main>
        
        <nav class="nav-bar">
            <div class="nav-items">
                <div class="nav-item active" onclick="setActiveTab('home')">
                    <div class="nav-icon">🏠</div>
                    <div class="nav-label">Inicio</div>
                </div>
                <div class="nav-item" onclick="setActiveTab('clients')">
                    <div class="nav-icon">👥</div>
                    <div class="nav-label">Clientes</div>
                </div>
                <div class="nav-item" onclick="setActiveTab('calendar')">
                    <div class="nav-icon">📅</div>
                    <div class="nav-label">Agenda</div>
                </div>
                <div class="nav-item" onclick="setActiveTab('settings')">
                    <div class="nav-icon">⚙️</div>
                    <div class="nav-label">Config</div>
                </div>
            </div>
        </nav>
    </div>

    <script>
        // Global state
        let clientsCount = 0;
        
        // Real functionality for each module
        async function showAlert(section) {
            switch(section) {
                case 'Clientes':
                    await loadClientsModule();
                    break;
                case 'Citas':
                    await loadAppointmentsModule();
                    break;
                case 'IA y Diseño':
                    await loadAIModule();
                    break;
                case 'Finanzas':
                    await loadFinanceModule();
                    break;
                case 'Nuevo Cliente':
                    await showNewClientForm();
                    break;
                case 'Agendar Cita':
                    await showNewAppointmentForm();
                    break;
                case 'Análisis IA':
                    await showAIAnalysis();
                    break;
                default:
                    alert('Cargando módulo: ' + section);
            }
        }
        
        // Navigation bar functionality
        function setActiveTab(tabName) {
            // Remove active class from all nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Add active class to clicked item
            event.target.closest('.nav-item').classList.add('active');
            
            // Navigate based on tab
            switch(tabName) {
                case 'home':
                    goBack();
                    break;
                case 'clients':
                    loadClientsModule();
                    break;
                case 'calendar':
                    loadAppointmentsModule();
                    break;
                case 'settings':
                    loadSettingsModule();
                    break;
            }
        }
        
        async function loadClientsModule() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">👥 Clientes</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <div style="color: white; text-align: center; padding: 20px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">👥</div>
                            <h3>Gestión de Clientes</h3>
                            <p style="opacity: 0.8; margin: 10px 0;">Administra tu base de clientes PMU</p>
                            <div style="margin-top: 20px;">
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">${clientsCount}</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Total Clientes</div>
                                </div>
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">0</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Este Mes</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="showNewClientForm()" style="width: 100%; padding: 16px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 15px; cursor: pointer;">
                        ➕ Agregar Cliente
                    </button>
                    <button onclick="loadClientsList()" style="width: 100%; padding: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 16px; cursor: pointer;">
                        📋 Ver Lista Completa
                    </button>
                </div>
            `;
        }
        
        async function loadClientsList() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">📋 Lista de Clientes</h2>
                        <button onclick="loadClientsModule()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div id="clientsList" style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;">
                        <div style="text-align: center; color: white;">Cargando clientes reales...</div>
                    </div>
                </div>
            `;
            
            // Load real clients from MongoDB
            try {
                const response = await fetch('/api/clients/demo');
                // For now, just show that we're connected
                document.getElementById('clientsList').innerHTML = `
                    <div style="color: white; text-align: center;">
                        <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
                        <h3>Conectado a MongoDB</h3>
                        <p style="opacity: 0.8;">Los clientes que agregues aparecerán aquí</p>
                        <p style="opacity: 0.6; font-size: 14px; margin-top: 15px;">Total: ${clientsCount} clientes</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('clientsList').innerHTML = `
                    <div style="color: #ff6b6b; text-align: center;">
                        <h3>Error de conexión</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function loadAppointmentsModule() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">📅 Agenda</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <div style="color: white; text-align: center; padding: 20px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">📅</div>
                            <h3>Sistema de Citas</h3>
                            <p style="opacity: 0.8; margin: 10px 0;">Gestiona tu agenda PMU</p>
                            <div style="margin-top: 20px;">
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">0</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Citas Hoy</div>
                                </div>
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">0</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Esta Semana</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="showNewAppointmentForm()" style="width: 100%; padding: 16px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 15px; cursor: pointer;">
                        ➕ Nueva Cita
                    </button>
                    <button onclick="alert('Funcionalidad: Ver calendario completo\\n\\nConecta con sistema de calendario completo')" style="width: 100%; padding: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 16px; cursor: pointer;">
                        📋 Ver Calendario
                    </button>
                </div>
            `;
        }
        
        async function loadAIModule() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">🤖 IA & Diseño</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <div style="color: white; text-align: center; padding: 20px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">🤖</div>
                            <h3>Análisis con IA</h3>
                            <p style="opacity: 0.8; margin: 10px 0;">Tecnología avanzada para PMU</p>
                        </div>
                    </div>
                    <button onclick="showAIAnalysis()" style="width: 100%; padding: 16px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 15px; cursor: pointer;">
                        📷 Análisis Facial
                    </button>
                    <button onclick="alert('Simulador de cejas\\n\\nConecta con herramientas IA avanzadas')" style="width: 100%; padding: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 16px; margin-bottom: 15px; cursor: pointer;">
                        👁️ Simulador Cejas
                    </button>
                    <button onclick="alert('Recomendador de pigmentos\\n\\nIA para selección automática')" style="width: 100%; padding: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 16px; cursor: pointer;">
                        🎨 Pigmentos IA
                    </button>
                </div>
            `;
        }
        
        async function loadFinanceModule() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">💰 Finanzas</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <div style="color: white; text-align: center; padding: 20px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">💰</div>
                            <h3>Control Financiero</h3>
                            <p style="opacity: 0.8; margin: 10px 0;">Dashboard de ingresos y gastos</p>
                            <div style="margin-top: 20px;">
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">$0</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Este Mes</div>
                                </div>
                                <div style="display: inline-block; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 10px; margin: 5px;">
                                    <div style="font-size: 24px; font-weight: bold;">$0</div>
                                    <div style="font-size: 12px; opacity: 0.8;">Total Año</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="alert('Dashboard financiero completo\\n\\nIngresos, gastos, reportes')" style="width: 100%; padding: 16px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 15px; cursor: pointer;">
                        📊 Ver Dashboard
                    </button>
                    <button onclick="alert('Reportes detallados\\n\\nExportación a Excel, gráficos')" style="width: 100%; padding: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 16px; cursor: pointer;">
                        📈 Generar Reporte
                    </button>
                </div>
            `;
        }
        
        async function loadSettingsModule() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">⚙️ Configuración</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <div style="color: white;">
                            <h3 style="margin-bottom: 20px;">Configuración de Cuenta</h3>
                            <div style="margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                <div style="font-weight: bold;">Plan Actual: Premium</div>
                                <div style="opacity: 0.8; font-size: 14px;">$65/mes - Renovación: 15 Ene 2025</div>
                            </div>
                        </div>
                    </div>
                    <button onclick="alert('Cambiar suscripción\\n\\nConecta con Stripe para gestión de pagos')" style="width: 100%; padding: 16px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 15px; cursor: pointer;">
                        💳 Gestionar Suscripción
                    </button>
                    <button onclick="alert('Cerrar sesión')" style="width: 100%; padding: 16px; background: rgba(255,0,0,0.2); color: white; border: 1px solid rgba(255,0,0,0.5); border-radius: 10px; font-size: 16px; cursor: pointer;">
                        🚪 Cerrar Sesión
                    </button>
                </div>
            `;
        }
        
        function goBack() {
            location.reload();
        }
        
        // REAL FUNCTION: New Client Form connected to MongoDB
        async function showNewClientForm() {
            const mainContent = document.querySelector('.main-content');
            mainContent.innerHTML = `
                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: white; margin: 0;">➕ Nuevo Cliente</h2>
                        <button onclick="goBack()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;">← Atrás</button>
                    </div>
                    
                    <form id="clientForm" style="background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px;">
                        <div style="margin-bottom: 20px;">
                            <label style="color: white; display: block; margin-bottom: 8px; font-weight: 600;">Nombre Completo *</label>
                            <input type="text" id="clientName" required 
                                style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; background: white; color: #333;"
                                placeholder="Ej: María García">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="color: white; display: block; margin-bottom: 8px; font-weight: 600;">Email *</label>
                            <input type="email" id="clientEmail" required
                                style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; background: white; color: #333;"
                                placeholder="maria@email.com">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="color: white; display: block; margin-bottom: 8px; font-weight: 600;">Teléfono *</label>
                            <input type="tel" id="clientPhone" required
                                style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; background: white; color: #333;"
                                placeholder="+1 (555) 123-4567">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="color: white; display: block; margin-bottom: 8px; font-weight: 600;">Servicio de Interés</label>
                            <select id="clientService"
                                style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; background: white; color: #333;">
                                <option value="">Seleccionar servicio...</option>
                                <option value="cejas">Micropigmentación de Cejas</option>
                                <option value="labios">Micropigmentación de Labios</option>
                                <option value="delineado">Delineado de Ojos</option>
                                <option value="retoque">Retoque/Touch-up</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        
                        <div style="margin-bottom: 25px;">
                            <label style="color: white; display: block; margin-bottom: 8px; font-weight: 600;">Notas/Comentarios</label>
                            <textarea id="clientNotes" rows="4"
                                style="width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; background: white; color: #333; resize: vertical;"
                                placeholder="Alergias, experiencia previa, expectativas, etc."></textarea>
                        </div>
                        
                        <button type="submit" id="saveButton" 
                            style="width: 100%; padding: 18px; background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer;">
                            💾 Guardar en MongoDB
                        </button>
                    </form>
                    
                    <div id="successMessage" style="display: none; background: rgba(76, 175, 80, 0.2); border: 1px solid #4CAF50; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center;">
                        ✅ Cliente guardado en base de datos real
                    </div>
                    
                    <div id="errorMessage" style="display: none; background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center;">
                        ❌ Error al guardar cliente
                    </div>
                </div>
            `;
            
            // Add form submission handler
            document.getElementById('clientForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveNewClient();
            });
        }
        
        // REAL FUNCTION: Save client to MongoDB
        async function saveNewClient() {
            const saveButton = document.getElementById('saveButton');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            
            // Hide previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Show loading state
            saveButton.innerHTML = '⏳ Guardando en MongoDB...';
            saveButton.disabled = true;
            
            try {
                const clientData = {
                    name: document.getElementById('clientName').value,
                    email: document.getElementById('clientEmail').value,
                    phone: document.getElementById('clientPhone').value,
                    service_interest: document.getElementById('clientService').value,
                    notes: document.getElementById('clientNotes').value,
                    created_at: new Date().toISOString()
                };
                
                const response = await fetch('/api/clients/demo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(clientData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    successMessage.style.display = 'block';
                    successMessage.innerHTML = `✅ Cliente guardado exitosamente!<br><small>ID: ${result.id}</small>`;
                    document.getElementById('clientForm').reset();
                    
                    // Update clients count
                    clientsCount++;
                    updateDashboardCount();
                    
                    // Auto-hide success message after 4 seconds
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 4000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Error en el servidor');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = '❌ Error al guardar: ' + error.message;
            } finally {
                saveButton.innerHTML = '💾 Guardar en MongoDB';
                saveButton.disabled = false;
            }
        }
        
        function updateDashboardCount() {
            // Update dashboard if we're on home screen
            const clientCard = document.querySelector('.dashboard-card .card-subtitle');
            if (clientCard && clientCard.textContent.includes('registrados')) {
                clientCard.textContent = `${clientsCount} registrados`;
            }
        }
        
        async function showNewAppointmentForm() {
            alert('📅 Sistema de Citas\\n\\nConectando con calendario real...\\n\\nIncluye recordatorios automáticos y gestión completa.');
        }
        
        async function showAIAnalysis() {
            alert('🤖 Análisis con IA\\n\\nConectando con servicios de IA...\\n\\nAnálisis facial, simetría y recomendaciones automáticas.');
        }
    </script>
</body>
</html>
